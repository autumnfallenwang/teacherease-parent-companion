name: Auto Release

# Every push to `main` (including PR merges) ends in a tagged release.
# Two paths funnel into the same build:
#
#   1. You bumped the version manually on your feature branch before
#      merging. We detect that and tag with the bumped version.
#
#   2. You didn't bump. We auto-bump the patch number, commit the bump
#      back to main as "chore: release vX.Y.Z [skip ci]", and tag it.
#
# Either way, the tag is pushed via workflow_call into release.yml which
# builds + signs + drafts the GitHub Release across all 4 platforms.

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: auto-release
  cancel-in-progress: false

jobs:
  tag:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Resolve version (auto-bump patch if unchanged)
        id: resolve
        env:
          CURR_BRANCH: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          curr=$(node -p "require('./package.json').version")
          echo "current version: $curr"

          prev=""
          if git rev-parse HEAD^ >/dev/null 2>&1; then
            prev=$(git show HEAD^:package.json 2>/dev/null | \
              node -e "let d=''; process.stdin.on('data',c=>d+=c); process.stdin.on('end',()=>{try{console.log(JSON.parse(d).version)}catch{console.log('')}})" || echo "")
            echo "previous version: $prev"
          fi

          if [ -z "$prev" ] || [ "$prev" = "$curr" ]; then
            IFS='.' read -r major minor patch <<< "$curr"
            new="${major}.${minor}.$((patch+1))"
            echo "no manual bump detected — auto-bumping to $new"
            node scripts/bump-version.mjs "$new"

            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add package.json src-tauri/Cargo.toml src-tauri/tauri.conf.json
            git commit -m "chore: release v$new [skip ci]"
            git push origin "HEAD:${CURR_BRANCH}"
            version="$new"
          else
            echo "manual bump detected: $prev → $curr"
            version="$curr"
          fi

          tag="v${version}"
          if git rev-parse "$tag" >/dev/null 2>&1; then
            echo "ERROR: tag $tag already exists — refusing to overwrite"
            exit 1
          fi

          git tag "$tag"
          git push origin "$tag"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

  release:
    needs: tag
    uses: ./.github/workflows/release.yml
    with:
      tag: ${{ needs.tag.outputs.tag }}
    secrets: inherit
