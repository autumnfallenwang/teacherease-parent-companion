name: Release

# Reusable build + sign + draft-release workflow. Called by auto-release.yml
# after it tags a new version. Also triggerable directly by a tag push
# for manual releases (e.g. maintainer-only hotfix).

on:
  workflow_call:
    inputs:
      tag:
        required: true
        type: string
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: Build & sign (${{ matrix.os }}${{ matrix.target && format(' / {0}', matrix.target) || '' }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: ""
          - os: windows-latest
            target: ""
          - os: macos-latest
            target: "aarch64-apple-darwin"
          - os: macos-latest
            target: "x86_64-apple-darwin"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref_name }}

      - uses: pnpm/action-setup@v4
        with:
          version: 10.29.3

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux Tauri deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - run: pnpm install --frozen-lockfile

      - name: Build, sign, and upload release assets
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ inputs.tag || github.ref_name }}
          releaseName: "TeacherEase Parent Companion v__VERSION__"
          releaseBody: "See the assets to download this version and install. This release was built automatically from the tag; edit these notes before publishing."
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
          args: ${{ matrix.target != '' && format('--target {0} ', matrix.target) || '' }}--config '{"bundle":{"createUpdaterArtifacts":true}}'
